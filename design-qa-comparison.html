<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Feature tour design comparison</title>
    <style>
      * { box-sizing: border-box; }
      body { margin: 0; padding: 18px; background: #172033; color: #fff; font: 700 14px system-ui, sans-serif; }
      main { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
      figure { min-width: 0; margin: 0; }
      figcaption { margin-bottom: 9px; letter-spacing: .04em; text-transform: uppercase; }
      img { display: block; width: 100%; height: auto; border-radius: 12px; background: #edf3f3; }
      @media (max-width: 700px) { main { grid-template-columns: 1fr; } }
    </style>
  </head>
  <body>
    <main>
      <figure><figcaption>Visual target</figcaption><img src="/qa-feature-tour-reference.png" alt="Generated feature-tour design target"></figure>
      <figure><figcaption>Rendered implementation</figcaption><img src="/qa-feature-tour-implementation.png" alt="Rendered feature-tour implementation"></figure>
    </main>
  </body>
</html>
