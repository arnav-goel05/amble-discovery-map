name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality checks
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint JavaScript
        run: npm run lint

      - name: Check changed-file formatting
        env:
          CI_BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before || github.sha }}
          CI_HEAD_SHA: ${{ github.sha }}
        run: npm run format:check

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Run unit and integration tests
        run: npm run test:unit

      - name: Run browser smoke tests
        run: npm run test:smoke

      - name: Verify Cloudflare production build
        run: npm run cloudflare:cloud:check
